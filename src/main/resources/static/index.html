<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPI - Malla Curricular</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }

        .menu-card {
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            border: none;
        }
        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12) !important;
        }
        .menu-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-box {
            background: #fff; border-radius: 10px; padding: 2rem;
            width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .manual-box {
            background: #fff; border-radius: 10px;
            width: 100%; max-width: 640px; max-height: 85vh;
            display: flex; flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .manual-body { overflow-y: auto; padding: 1.5rem; flex: 1; }
        .shortcut-hint {
            position: fixed; bottom: 1rem; right: 1rem;
            background: rgba(0,0,0,0.55); color: #fff;
            font-size: 0.75rem; padding: 0.3rem 0.65rem;
            border-radius: 6px; pointer-events: none; z-index: 500;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { createElement as h, useState, useEffect } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import htm from 'https://esm.sh/htm@3';

        const html = htm.bind(h);

        // â”€â”€ Manual de usuario â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        const SECCIONES = {
            menu: 'general',
            facultad: 'facultades',
            carrera: 'carreras',
            materia: 'materias',
        };

        const CONTENIDO = {
            general: {
                titulo: 'VisiĂłn general',
                icono: 'bi-house',
                items: [
                    { titulo: 'NavegaciĂłn', texto: 'Desde el menĂş principal podĂ©s acceder a cada mĂłdulo del sistema haciendo clic en su card.' },
                    { titulo: 'Atajo de teclado', texto: 'PresionĂˇ M en cualquier pantalla para abrir o cerrar este manual. PresionĂˇ Escape para cerrarlo.' },
                ],
            },
            facultades: {
                titulo: 'Facultades',
                icono: 'bi-building',
                items: [
                    { titulo: 'Crear', texto: 'HacĂ© clic en "+ Nueva Facultad", completĂˇ el formulario (Nombre y CĂłdigo son obligatorios) y presionĂˇ Crear.' },
                    { titulo: 'Editar', texto: 'HacĂ© clic en Editar sobre la fila que querĂ©s modificar, actualizĂˇ los campos y presionĂˇ Actualizar.' },
                    { titulo: 'Eliminar', texto: 'HacĂ© clic en Eliminar sobre la fila correspondiente y confirmĂˇ el diĂˇlogo. La acciĂłn no se puede deshacer.' },
                    { titulo: 'Campos', texto: 'Nombre y CĂłdigo son obligatorios. Email, DirecciĂłn, TelĂ©fono y Decano son opcionales.' },
                ],
            },
            carreras: {
                titulo: 'Carreras',
                icono: 'bi-mortarboard',
                items: [
                    { titulo: 'Crear', texto: 'HacĂ© clic en "+ Nueva Carrera", completĂˇ el formulario (Nombre, CĂłdigo y Facultad son obligatorios) y presionĂˇ Crear.' },
                    { titulo: 'Editar', texto: 'HacĂ© clic en Editar sobre la fila que querĂ©s modificar, actualizĂˇ los campos y presionĂˇ Actualizar.' },
                    { titulo: 'Eliminar', texto: 'HacĂ© clic en Eliminar sobre la fila correspondiente y confirmĂˇ el diĂˇlogo. La acciĂłn no se puede deshacer.' },
                    { titulo: 'Campos', texto: 'Nombre, CĂłdigo y Facultad son obligatorios. DuraciĂłn (en semestres) y Coordinador son opcionales.' },
                ],
            },
            materias: {
                titulo: 'Materias',
                icono: 'bi-journal-text',
                items: [
                    { titulo: 'Crear', texto: 'HacĂ© clic en "+ Nueva Materia", completĂˇ el formulario (Nombre, CĂłdigo y Carrera son obligatorios) y presionĂˇ Crear.' },
                    { titulo: 'Editar', texto: 'HacĂ© clic en Editar sobre la fila que querĂ©s modificar, actualizĂˇ los campos y presionĂˇ Actualizar.' },
                    { titulo: 'Eliminar', texto: 'HacĂ© clic en Eliminar sobre la fila correspondiente y confirmĂˇ el diĂˇlogo. La acciĂłn no se puede deshacer.' },
                    { titulo: 'Campos', texto: 'Nombre, CĂłdigo y Carrera son obligatorios. CrĂ©ditos y Semestre son opcionales.' },
                ],
            },
        };

        function Manual({ vista, cerrar }) {
            const [tab, setTab] = useState(SECCIONES[vista] || 'general');
            const tabs = Object.keys(CONTENIDO);
            const seccion = CONTENIDO[tab];

            useEffect(() => {
                function onKey(e) { if (e.key === 'Escape') cerrar(); }
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            return html`
                <div className="modal-overlay" onClick=${cerrar}>
                    <div className="manual-box" onClick=${e => e.stopPropagation()}>
                        <div className="d-flex align-items-center justify-content-between px-4 pt-4 pb-3 border-bottom">
                            <h5 className="fw-bold mb-0">
                                <i className="bi bi-book me-2 text-primary" />
                                Manual de usuario
                            </h5>
                            <button className="btn-close" onClick=${cerrar} />
                        </div>

                        <div className="px-4 pt-3">
                            <ul className="nav nav-tabs">
                                ${tabs.map(t => html`
                                    <li key=${t} className="nav-item">
                                        <button
                                            className=${'nav-link' + (tab === t ? ' active' : '')}
                                            onClick=${() => setTab(t)}>
                                            <i className=${'bi ' + CONTENIDO[t].icono + ' me-1'} />
                                            ${CONTENIDO[t].titulo}
                                        </button>
                                    </li>
                                `)}
                            </ul>
                        </div>

                        <div className="manual-body">
                            ${seccion.items.map((item, i) => html`
                                <div key=${i} className=${'mb-4' + (i < seccion.items.length - 1 ? '' : '')}>
                                    <h6 className="fw-semibold text-primary mb-1">
                                        <i className="bi bi-chevron-right me-1" />${item.titulo}
                                    </h6>
                                    <p className="text-muted mb-0 ps-3">${item.texto}</p>
                                </div>
                            `)}
                        </div>

                        <div className="px-4 py-3 border-top text-muted small text-end">
                            PresionĂˇ <kbd>M</kbd> para abrir Â· <kbd>Esc</kbd> para cerrar
                        </div>
                    </div>
                </div>
            `;
        }

        // â”€â”€ Menu principal â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        function Menu({ irA }) {
            const modulos = [
                {
                    id: 'facultad',
                    titulo: 'Facultades',
                    descripcion: 'GestiĂłn de facultades universitarias',
                    icono: 'bi-building',
                    color: 'primary',
                    activo: true,
                },
                {
                    id: 'carrera',
                    titulo: 'Carreras',
                    descripcion: 'GestiĂłn de carreras acadĂ©micas',
                    icono: 'bi-mortarboard',
                    color: 'success',
                    activo: true,
                },
                {
                    id: 'materia',
                    titulo: 'Materias',
                    descripcion: 'GestiĂłn de materias y asignaturas',
                    icono: 'bi-journal-text',
                    color: 'info',
                    activo: true,
                },
                {
                    id: 'malla',
                    titulo: 'Malla Curricular',
                    descripcion: 'GestiĂłn de mallas curriculares',
                    icono: 'bi-diagram-3',
                    color: 'secondary',
                    activo: false,
                },
            ];

            return html`
                <div className="min-vh-100 d-flex flex-column">
                    <header className="bg-primary text-white py-4 shadow-sm">
                        <div className="container">
                            <h1 className="mb-0 fw-bold fs-4">GPI - Malla Curricular</h1>
                            <small className="opacity-75">Sistema de gestiĂłn acadĂ©mica</small>
                        </div>
                    </header>

                    <main className="container py-5 flex-grow-1">
                        <h5 className="text-muted mb-4">SeleccionĂˇ un mĂłdulo para continuar</h5>
                        <div className="row g-4">
                            ${modulos.map(m => html`
                                <div key=${m.id} className="col-sm-6 col-md-4 col-lg-3">
                                    <div
                                        className=${'card menu-card shadow-sm h-100 text-center p-3' + (!m.activo ? ' opacity-50' : '')}
                                        onClick=${() => m.activo && irA(m.id)}
                                        style=${{ cursor: m.activo ? 'pointer' : 'default' }}>
                                        <div className="card-body position-relative">
                                            ${!m.activo && html`
                                                <span className="position-absolute top-0 end-0 badge bg-secondary m-2" style=${{fontSize:'0.65rem'}}>
                                                    PrĂłximamente
                                                </span>
                                            `}
                                            <div className=${'menu-icon text-' + m.color}>
                                                <i className=${'bi ' + m.icono} />
                                            </div>
                                            <h6 className="card-title fw-semibold">${m.titulo}</h6>
                                            <p className="card-text text-muted small">${m.descripcion}</p>
                                        </div>
                                    </div>
                                </div>
                            `)}
                        </div>
                    </main>
                </div>
            `;
        }

        // â”€â”€ CRUD Facultades â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        const API = '/api/facultad';
        const FORM_VACIO = { name: '', code: '', email: '', address: '', phoneNumber: '', dean: '' };

        function Facultades({ volver }) {
            const [facultades, setFacultades]   = useState([]);
            const [cargando, setCargando]        = useState(true);
            const [modal, setModal]              = useState(false);
            const [editandoId, setEditandoId]    = useState(null);
            const [form, setForm]                = useState(FORM_VACIO);
            const [guardando, setGuardando]      = useState(false);
            const [alerta, setAlerta]            = useState(null);

            useEffect(() => { cargarFacultades(); }, []);

            async function cargarFacultades() {
                setCargando(true);
                try {
                    const res = await fetch(API);
                    if (!res.ok) throw new Error('Error al obtener las facultades');
                    setFacultades(await res.json());
                } catch (e) {
                    mostrarAlerta(e.message, 'danger');
                } finally {
                    setCargando(false);
                }
            }

            function mostrarAlerta(msg, tipo = 'success') {
                setAlerta({ msg, tipo });
                setTimeout(() => setAlerta(null), 3500);
            }

            function abrirCrear() {
                setForm(FORM_VACIO);
                setEditandoId(null);
                setModal(true);
            }

            function abrirEditar(f) {
                setForm({
                    name:        f.name        || '',
                    code:        f.code        || '',
                    email:       f.email       || '',
                    address:     f.address     || '',
                    phoneNumber: f.phoneNumber || '',
                    dean:        f.dean        || '',
                });
                setEditandoId(f.id);
                setModal(true);
            }

            function cerrarModal() {
                setModal(false);
                setEditandoId(null);
                setForm(FORM_VACIO);
            }

            function cambiarCampo(e) {
                const { name, value } = e.target;
                setForm(prev => ({ ...prev, [name]: value }));
            }

            async function guardar(e) {
                e.preventDefault();
                setGuardando(true);
                const url    = editandoId ? `${API}/${editandoId}` : API;
                const metodo = editandoId ? 'PUT' : 'POST';
                try {
                    const res = await fetch(url, {
                        method: metodo,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(form),
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.error || 'Error al guardar');
                    }
                    await cargarFacultades();
                    cerrarModal();
                    mostrarAlerta(editandoId ? 'Facultad actualizada correctamente' : 'Facultad creada correctamente');
                } catch (e) {
                    mostrarAlerta(e.message, 'danger');
                } finally {
                    setGuardando(false);
                }
            }

            async function eliminar(id, nombre) {
                if (!confirm(`ÂżEliminar la facultad "${nombre}"?`)) return;
                try {
                    const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
                    if (!res.ok) throw new Error('Error al eliminar la facultad');
                    await cargarFacultades();
                    mostrarAlerta('Facultad eliminada correctamente');
                } catch (e) {
                    mostrarAlerta(e.message, 'danger');
                }
            }

            return html`
                <div className="min-vh-100 d-flex flex-column">
                    <header className="bg-white border-bottom py-3 shadow-sm">
                        <div className="container d-flex align-items-center gap-3">
                            <button className="btn btn-outline-secondary btn-sm" onClick=${volver}>
                                <i className="bi bi-arrow-left me-1" /> MenĂş
                            </button>
                            <div>
                                <span className="fw-bold">Facultades</span>
                                <span className="text-muted small ms-2">GPI - Malla Curricular</span>
                            </div>
                        </div>
                    </header>

                    <main className="container py-4 flex-grow-1">
                        <div className="d-flex justify-content-between align-items-center mb-4">
                            <h4 className="fw-bold mb-0">Listado de Facultades</h4>
                            <button className="btn btn-primary px-4" onClick=${abrirCrear}>
                                + Nueva Facultad
                            </button>
                        </div>

                        ${alerta && html`
                            <div className=${`alert alert-${alerta.tipo} alert-dismissible fade show`} role="alert">
                                ${alerta.msg}
                                <button type="button" className="btn-close" onClick=${() => setAlerta(null)} />
                            </div>
                        `}

                        <div className="card shadow-sm border-0">
                            ${cargando ? html`
                                <div className="text-center py-5">
                                    <div className="spinner-border text-primary" role="status" />
                                    <p className="mt-2 text-muted">Cargando...</p>
                                </div>
                            ` : html`
                                <div className="table-responsive">
                                    <table className="table table-hover align-middle mb-0">
                                        <thead className="table-light">
                                            <tr>
                                                <th style=${{ width: '60px' }}>#</th>
                                                <th>Nombre</th>
                                                <th>CĂłdigo</th>
                                                <th>Decano</th>
                                                <th style=${{ width: '170px' }}>Acciones</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${facultades.length === 0 ? html`
                                                <tr>
                                                    <td colSpan="5" className="text-center text-muted py-5">
                                                        No hay facultades registradas
                                                    </td>
                                                </tr>
                                            ` : facultades.map(f => html`
                                                <tr key=${f.id}>
                                                    <td className="text-muted">${f.id}</td>
                                                    <td className="fw-semibold">${f.name}</td>
                                                    <td><span className="badge bg-secondary">${f.code}</span></td>
                                                    <td className="text-muted">${f.dean || 'â€”'}</td>
                                                    <td>
                                                        <button className="btn btn-sm btn-outline-primary me-2"
                                                            onClick=${() => abrirEditar(f)}>
                                                            Editar
                                                        </button>
                                                        <button className="btn btn-sm btn-outline-danger"
                                                            onClick=${() => eliminar(f.id, f.name)}>
                                                            Eliminar
                                                        </button>
                                                    </td>
                                                </tr>
                                            `)}
                                        </tbody>
                                    </table>
                                </div>
                            `}
                        </div>
                    </main>

                    ${modal && html`
                        <div className="modal-overlay" onClick=${cerrarModal}>
                            <div className="modal-box" onClick=${e => e.stopPropagation()}>
                                <h5 className="fw-bold mb-4">
                                    ${editandoId ? 'Editar Facultad' : 'Nueva Facultad'}
                                </h5>
                                <form onSubmit=${guardar}>
                                    <div className="row g-3">
                                        <div className="col-12">
                                            <label className="form-label">Nombre <span className="text-danger">*</span></label>
                                            <input className="form-control" name="name"
                                                value=${form.name} onInput=${cambiarCampo}
                                                placeholder="Ej: Facultad de Ciencias y TecnologĂ­a" required />
                                        </div>
                                        <div className="col-md-4">
                                            <label className="form-label">CĂłdigo <span className="text-danger">*</span></label>
                                            <input className="form-control" name="code"
                                                value=${form.code} onInput=${cambiarCampo}
                                                placeholder="Ej: FACYT" required />
                                        </div>
                                        <div className="col-md-8">
                                            <label className="form-label">Email</label>
                                            <input className="form-control" name="email" type="email"
                                                value=${form.email} onInput=${cambiarCampo}
                                                placeholder="facultad@uaa.edu.py" />
                                        </div>
                                        <div className="col-12">
                                            <label className="form-label">DirecciĂłn</label>
                                            <input className="form-control" name="address"
                                                value=${form.address} onInput=${cambiarCampo}
                                                placeholder="DirecciĂłn de la facultad" />
                                        </div>
                                        <div className="col-md-6">
                                            <label className="form-label">TelĂ©fono</label>
                                            <input className="form-control" name="phoneNumber"
                                                value=${form.phoneNumber} onInput=${cambiarCampo}
                                                placeholder="021-000-000" />
                                        </div>
                                        <div className="col-md-6">
                                            <label className="form-label">Decano</label>
                                            <input className="form-control" name="dean"
                                                value=${form.dean} onInput=${cambiarCampo}
                                                placeholder="Nombre del decano" />
                                        </div>
                                    </div>
                                    <hr className="my-4" />
                                    <div className="d-flex justify-content-end gap-2">
                                        <button type="button" className="btn btn-secondary"
                                            onClick=${cerrarModal}>Cancelar</button>
                                        <button type="submit" className="btn btn-primary px-4"
                                            disabled=${guardando}>
                                            ${guardando ? html`<span className="spinner-border spinner-border-sm me-2" />` : null}
                                            ${editandoId ? 'Actualizar' : 'Crear'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    `}
                </div>
            `;
        }

        // â”€â”€ CRUD Carreras â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        const API_CARRERA = '/api/carrera';
        const FORM_CARRERA_VACIO = { name: '', code: '', duration: '', coordinador: '', facultadId: '' };

        function Carreras({ volver }) {
            const [carreras, setCarreras]     = useState([]);
            const [facultades, setFacultades] = useState([]);
            const [cargando, setCargando]     = useState(true);
            const [modal, setModal]           = useState(false);
            const [editandoId, setEditandoId] = useState(null);
            const [form, setForm]             = useState(FORM_CARRERA_VACIO);
            const [guardando, setGuardando]   = useState(false);
            const [alerta, setAlerta]         = useState(null);

            useEffect(() => { cargarCarreras(); cargarFacultades(); }, []);

            async function cargarCarreras() {
                setCargando(true);
                try {
                    const res = await fetch(API_CARRERA);
                    if (!res.ok) throw new Error('Error al obtener las carreras');
                    setCarreras(await res.json());
                } catch (e) {
                    mostrarAlerta(e.message, 'danger');
                } finally {
                    setCargando(false);
                }
            }

            async function cargarFacultades() {
                try {
                    const res = await fetch('/api/facultad');
                    if (!res.ok) throw new Error();
                    setFacultades(await res.json());
                } catch {
                    mostrarAlerta('No se pudieron cargar las facultades', 'danger');
                }
            }

            function mostrarAlerta(msg, tipo = 'success') {
                setAlerta({ msg, tipo });
                setTimeout(() => setAlerta(null), 3500);
            }

            function abrirCrear() {
                setForm(FORM_CARRERA_VACIO);
                setEditandoId(null);
                setModal(true);
            }

            function abrirEditar(c) {
                setForm({
                    name:        c.name        || '',
                    code:        c.code        || '',
                    duration:    c.duration    != null ? String(c.duration)  : '',
                    coordinador: c.coordinador || '',
                    facultadId:  c.facultadId  != null ? String(c.facultadId) : '',
                });
                setEditandoId(c.id);
                setModal(true);
            }

            function cerrarModal() {
                setModal(false);
                setEditandoId(null);
                setForm(FORM_CARRERA_VACIO);
            }

            function cambiarCampo(e) {
                const { name, value } = e.target;
                setForm(prev => ({ ...prev, [name]: value }));
            }

            async function guardar(e) {
                e.preventDefault();
                setGuardando(true);
                const url    = editandoId ? `${API_CARRERA}/${editandoId}` : API_CARRERA;
                const metodo = editandoId ? 'PUT' : 'POST';
                const payload = {
                    ...form,
                    duration:   form.duration   !== '' ? Number(form.duration)   : null,
                    facultadId: form.facultadId !== '' ? Number(form.facultadId) : null,
                };
                try {
                    const res = await fetch(url, {
                        method: metodo,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.error || 'Error al guardar');
                    }
                    await cargarCarreras();
                    cerrarModal();
                    mostrarAlerta(editandoId ? 'Carrera actualizada correctamente' : 'Carrera creada correctamente');
                } catch (e) {
                    mostrarAlerta(e.message, 'danger');
                } finally {
                    setGuardando(false);
                }
            }

            async function eliminar(id, nombre) {
                if (!confirm(`ÂżEliminar la carrera "${nombre}"?`)) return;
                try {
                    const res = await fetch(`${API_CARRERA}/${id}`, { method: 'DELETE' });
                    if (!res.ok) throw new Error('Error al eliminar la carrera');
                    await cargarCarreras();
                    mostrarAlerta('Carrera eliminada correctamente');
                } catch (e) {
                    mostrarAlerta(e.message, 'danger');
                }
            }

            return html`
                <div className="min-vh-100 d-flex flex-column">
                    <header className="bg-white border-bottom py-3 shadow-sm">
                        <div className="container d-flex align-items-center gap-3">
                            <button className="btn btn-outline-secondary btn-sm" onClick=${volver}>
                                <i className="bi bi-arrow-left me-1" /> MenĂş
                            </button>
                            <div>
                                <span className="fw-bold">Carreras</span>
                                <span className="text-muted small ms-2">GPI - Malla Curricular</span>
                            </div>
                        </div>
                    </header>

                    <main className="container py-4 flex-grow-1">
                        <div className="d-flex justify-content-between align-items-center mb-4">
                            <h4 className="fw-bold mb-0">Listado de Carreras</h4>
                            <button className="btn btn-success px-4" onClick=${abrirCrear}>
                                + Nueva Carrera
                            </button>
                        </div>

                        ${alerta && html`
                            <div className=${`alert alert-${alerta.tipo} alert-dismissible fade show`} role="alert">
                                ${alerta.msg}
                                <button type="button" className="btn-close" onClick=${() => setAlerta(null)} />
                            </div>
                        `}

                        <div className="card shadow-sm border-0">
                            ${cargando ? html`
                                <div className="text-center py-5">
                                    <div className="spinner-border text-success" role="status" />
                                    <p className="mt-2 text-muted">Cargando...</p>
                                </div>
                            ` : html`
                                <div className="table-responsive">
                                    <table className="table table-hover align-middle mb-0">
                                        <thead className="table-light">
                                            <tr>
                                                <th style=${{ width: '60px' }}>#</th>
                                                <th>Nombre</th>
                                                <th>CĂłdigo</th>
                                                <th>Facultad</th>
                                                <th>Coordinador</th>
                                                <th style=${{ width: '170px' }}>Acciones</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${carreras.length === 0 ? html`
                                                <tr>
                                                    <td colSpan="6" className="text-center text-muted py-5">
                                                        No hay carreras registradas
                                                    </td>
                                                </tr>
                                            ` : carreras.map(c => html`
                                                <tr key=${c.id}>
                                                    <td className="text-muted">${c.id}</td>
                                                    <td className="fw-semibold">${c.name}</td>
                                                    <td><span className="badge bg-success">${c.code}</span></td>
                                                    <td className="text-muted">${c.facultadName || 'â€”'}</td>

                                                    <td>
                                                        <button className="btn btn-sm btn-outline-primary me-2"
                                                            onClick=${() => abrirEditar(c)}>
                                                            Editar
                                                        </button>
                                                        <button className="btn btn-sm btn-outline-danger"
                                                            onClick=${() => eliminar(c.id, c.name)}>

                                                        </button>
                                                    </td>
                                                </tr>
                                            `)}
                                        </tbody>
                                    </table>
                                </div>
                            `}
                        </div>
                    </main>

                    ${modal && html`
                        <div className="modal-overlay" onClick=${cerrarModal}>
                            <div className="modal-box" onClick=${e => e.stopPropagation()}>
                                <h5 className="fw-bold mb-4">
                                    ${editandoId ? 'Editar Carrera' : 'Nueva Carrera'}
                                </h5>
                                <form onSubmit=${guardar}>
                                    <div className="row g-3">
                                        <div className="col-12">
                                            <label className="form-label">Nombre <span className="text-danger">*</span></label>
                                            <input className="form-control" name="name"
                                                value=${form.name} onInput=${cambiarCampo}
                                                placeholder="Ej: IngenierĂ­a en Sistemas" required />
                                        </div>
                                        <div className="col-md-5">
                                            <label className="form-label">CĂłdigo <span className="text-danger">*</span></label>
                                            <input className="form-control" name="code"
                                                value=${form.code} onInput=${cambiarCampo}
                                                placeholder="Ej: ING-SIS" required />
                                        </div>
                                        <div className="col-md-7">
                                            <label className="form-label">Facultad <span className="text-danger">*</span></label>
                                            <select className="form-select" name="facultadId"
                                                value=${form.facultadId} onChange=${cambiarCampo} required>
                                                <option value="">SeleccionĂˇ una facultad</option>
                                                ${facultades.map(f => html`
                                                    <option key=${f.id} value=${f.id}>${f.name}</option>
                                                `)}
                                            </select>
                                        </div>
                                        <div className="col-md-6">
                                            <label className="form-label">DuraciĂłn (semestres)</label>
                                            <input className="form-control" name="duration" type="number" min="1"
                                                value=${form.duration} onInput=${cambiarCampo}
                                                placeholder="Ej: 10" />
                                        </div>
                                        <div className="col-md-6">
                                            <label className="form-label">Coordinador</label>
                                            <input className="form-control" name="coordinador"
                                                value=${form.coordinador} onInput=${cambiarCampo}
                                                placeholder="Nombre del coordinador" />
                                        </div>

                                    <hr className="my-4" />
                                    <div className="d-flex justify-content-end gap-2">
                                        <button type="button" className="btn btn-secondary"
                                            onClick=${cerrarModal}>Cancelar</button>

                                            disabled=${guardando}>
                                            ${guardando ? html`<span className="spinner-border spinner-border-sm me-2" />` : null}

                        </div>

        }

        // â”€â”€ CRUD Materias â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        const API_MATERIA = '/api/materia';
        const FORM_MATERIA_VACIO = { name: '', code: '', credits: '', semester: '', carreraId: '' };

        function Materias({ volver }) {
            const [materias, setMaterias]   = useState([]);
            const [carreras, setCarreras]   = useState([]);
            const [cargando, setCargando]   = useState(true);
            const [modal, setModal]         = useState(false);
            const [editandoId, setEditandoId] = useState(null);
            const [form, setForm]           = useState(FORM_MATERIA_VACIO);
            const [guardando, setGuardando] = useState(false);
            const [alerta, setAlerta]       = useState(null);

            useEffect(() => { cargarMaterias(); cargarCarreras(); }, []);

            async function cargarMaterias() {
                setCargando(true);
                try {
                    const res = await fetch(API_MATERIA);
                    if (!res.ok) throw new Error('Error al obtener las materias');
                    setMaterias(await res.json());
                } catch (e) {
                    mostrarAlerta(e.message, 'danger');
                } finally {
                    setCargando(false);
                }
            }

            async function cargarCarreras() {
                try {
                    const res = await fetch(API_CARRERA);
                    if (!res.ok) throw new Error();
                    setCarreras(await res.json());
                } catch {
                    mostrarAlerta('No se pudieron cargar las carreras', 'danger');
                }
            }

            function mostrarAlerta(msg, tipo = 'success') {
                setAlerta({ msg, tipo });
                setTimeout(() => setAlerta(null), 3500);
            }

            function abrirCrear() {
                setForm(FORM_MATERIA_VACIO);
                setEditandoId(null);
                setModal(true);
            }

            function abrirEditar(m) {
                setForm({
                    name:      m.name      || '',
                    code:      m.code      || '',
                    credits:   m.credits   != null ? String(m.credits)   : '',
                    semester:  m.semester  != null ? String(m.semester)  : '',
                    carreraId: m.carreraId != null ? String(m.carreraId) : '',
                });
                setEditandoId(m.id);
                setModal(true);
            }

            function cerrarModal() {
                setModal(false);
                setEditandoId(null);
                setForm(FORM_MATERIA_VACIO);
            }

            function cambiarCampo(e) {
                const { name, value } = e.target;
                setForm(prev => ({ ...prev, [name]: value }));
            }

            async function guardar(e) {
                e.preventDefault();
                setGuardando(true);
                const url    = editandoId ? `${API_MATERIA}/${editandoId}` : API_MATERIA;
                const metodo = editandoId ? 'PUT' : 'POST';
                const payload = {
                    ...form,
                    credits:   form.credits   !== '' ? Number(form.credits)   : null,
                    semester:  form.semester  !== '' ? Number(form.semester)  : null,
                    carreraId: form.carreraId !== '' ? Number(form.carreraId) : null,
                };
                try {
                    const res = await fetch(url, {
                        method: metodo,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.error || 'Error al guardar');
                    }
                    await cargarMaterias();
                    cerrarModal();
                    mostrarAlerta(editandoId ? 'Materia actualizada correctamente' : 'Materia creada correctamente');
                } catch (e) {
                    mostrarAlerta(e.message, 'danger');
                } finally {
                    setGuardando(false);
                }
            }

            async function eliminar(id, nombre) {
                if (!confirm(`ÂżEliminar la materia "${nombre}"?`)) return;
                try {
                    const res = await fetch(`${API_MATERIA}/${id}`, { method: 'DELETE' });
                    if (!res.ok) throw new Error('Error al eliminar la materia');
                    await cargarMaterias();
                    mostrarAlerta('Materia eliminada correctamente');
                } catch (e) {
                    mostrarAlerta(e.message, 'danger');
                }
            }

            return html`
                <div className="min-vh-100 d-flex flex-column">
                    <header className="bg-white border-bottom py-3 shadow-sm">
                        <div className="container d-flex align-items-center gap-3">
                            <button className="btn btn-outline-secondary btn-sm" onClick=${volver}>
                                <i className="bi bi-arrow-left me-1" /> MenĂş
                            </button>
                            <div>
                                <span className="fw-bold">Materias</span>
                                <span className="text-muted small ms-2">GPI - Malla Curricular</span>
                            </div>
                        </div>
                    </header>

                    <main className="container py-4 flex-grow-1">
                        <div className="d-flex justify-content-between align-items-center mb-4">
                            <h4 className="fw-bold mb-0">Listado de Materias</h4>
                            <button className="btn btn-info px-4" onClick=${abrirCrear}>
                                + Nueva Materia
                            </button>
                        </div>

                        ${alerta && html`
                            <div className=${`alert alert-${alerta.tipo} alert-dismissible fade show`} role="alert">
                                ${alerta.msg}
                                <button type="button" className="btn-close" onClick=${() => setAlerta(null)} />
                            </div>
                        `}

                        <div className="card shadow-sm border-0">
                            ${cargando ? html`
                                <div className="text-center py-5">
                                    <div className="spinner-border text-info" role="status" />
                                    <p className="mt-2 text-muted">Cargando...</p>
                                </div>
                            ` : html`
                                <div className="table-responsive">
                                    <table className="table table-hover align-middle mb-0">
                                        <thead className="table-light">
                                            <tr>
                                                <th style=${{ width: '60px' }}>#</th>
                                                <th>Nombre</th>
                                                <th>CĂłdigo</th>
                                                <th>Carrera</th>
                                                <th>CrĂ©ditos</th>
                                                <th>Semestre</th>
                                                <th style=${{ width: '170px' }}>Acciones</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${materias.length === 0 ? html`
                                                <tr>
                                                    <td colSpan="7" className="text-center text-muted py-5">
                                                        No hay materias registradas
                                                    </td>
                                                </tr>
                                            ` : materias.map(m => html`
                                                <tr key=${m.id}>
                                                    <td className="text-muted">${m.id}</td>
                                                    <td className="fw-semibold">${m.name}</td>
                                                    <td><span className="badge bg-info text-dark">${m.code}</span></td>
                                                    <td className="text-muted">${m.carreraName || 'â€”'}</td>
                                                    <td className="text-muted">${m.credits != null ? m.credits : 'â€”'}</td>
                                                    <td className="text-muted">${m.semester != null ? m.semester : 'â€”'}</td>
                                                    <td>
                                                        <button className="btn btn-sm btn-outline-primary me-2"
                                                            onClick=${() => abrirEditar(m)}>
                                                            Editar
                                                        </button>
                                                        <button className="btn btn-sm btn-outline-danger"
                                                            onClick=${() => eliminar(m.id, m.name)}>
                                                            Eliminar
                                                        </button>
                                                    </td>
                                                </tr>
                                            `)}
                                        </tbody>
                                    </table>
                                </div>
                            `}
                        </div>
                    </main>

                    ${modal && html`
                        <div className="modal-overlay" onClick=${cerrarModal}>
                            <div className="modal-box" onClick=${e => e.stopPropagation()}>
                                <h5 className="fw-bold mb-4">
                                    ${editandoId ? 'Editar Materia' : 'Nueva Materia'}
                                </h5>
                                <form onSubmit=${guardar}>
                                    <div className="row g-3">
                                        <div className="col-12">
                                            <label className="form-label">Nombre <span className="text-danger">*</span></label>
                                            <input className="form-control" name="name"
                                                value=${form.name} onInput=${cambiarCampo}
                                                placeholder="Ej: ProgramaciĂłn I" required />
                                        </div>
                                        <div className="col-md-5">
                                            <label className="form-label">CĂłdigo <span className="text-danger">*</span></label>
                                            <input className="form-control" name="code"
                                                value=${form.code} onInput=${cambiarCampo}
                                                placeholder="Ej: PROG-001" required />
                                        </div>
                                        <div className="col-md-7">
                                            <label className="form-label">Carrera <span className="text-danger">*</span></label>
                                            <select className="form-select" name="carreraId"
                                                value=${form.carreraId} onChange=${cambiarCampo} required>
                                                <option value="">SeleccionĂˇ una carrera</option>
                                                ${carreras.map(c => html`
                                                    <option key=${c.id} value=${c.id}>${c.name}</option>
                                                `)}
                                            </select>
                                        </div>
                                        <div className="col-md-6">
                                            <label className="form-label">CrĂ©ditos</label>
                                            <input className="form-control" name="credits" type="number" min="1"
                                                value=${form.credits} onInput=${cambiarCampo}
                                                placeholder="Ej: 4" />
                                        </div>
                                        <div className="col-md-6">
                                            <label className="form-label">Semestre</label>
                                            <input className="form-control" name="semester" type="number" min="1"
                                                value=${form.semester} onInput=${cambiarCampo}
                                                placeholder="Ej: 1" />
                                        </div>
                                    </div>
                                    <hr className="my-4" />
                                    <div className="d-flex justify-content-end gap-2">
                                        <button type="button" className="btn btn-secondary"
                                            onClick=${cerrarModal}>Cancelar</button>
                                        <button type="submit" className="btn btn-info px-4"
                                            disabled=${guardando}>
                                            ${guardando ? html`<span className="spinner-border spinner-border-sm me-2" />` : null}
                                            ${editandoId ? 'Actualizar' : 'Crear'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    `}
                </div>
            `;
        }

        // â”€â”€ RaĂ­z â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        function App() {
            const [vista, setVista]       = useState('menu');
            const [manual, setManual]     = useState(false);

            useEffect(() => {
                function onKey(e) {
                    const tag = document.activeElement?.tagName;
                    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
                    if (e.key === 'm' || e.key === 'M') setManual(v => !v);
                }
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            return html`
                ${vista === 'menu'
                    ? html`<${Menu} irA=${setVista} />`
                    : vista === 'carrera'
                        ? html`<${Carreras} volver=${() => setVista('menu')} />`
                        : vista === 'materia'
                            ? html`<${Materias} volver=${() => setVista('menu')} />`
                            : html`<${Facultades} volver=${() => setVista('menu')} />`
                }
                <div className="shortcut-hint"><kbd style=${{background:'transparent',border:'none',color:'#fff'}}>M</kbd> Ayuda</div>
                ${manual && html`<${Manual} vista=${vista} cerrar=${() => setManual(false)} />`}
            `;
        }

        createRoot(document.getElementById('root')).render(html`<${App} />`);
    </script>
</body>
</html>
